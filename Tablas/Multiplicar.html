<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla del 3 - ¡Modo Franxx!</title>
    <link rel="stylesheet" href="Multiplicar.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="anime-speed-lines"></div>

    <div class="dashboard-wrapper levitate">
        <div class="dashboard-grid">

            <div class="card-franxx panel-1">
                <div class="profile-section">
                    <div class="aura-container">
                        <img src="Gemini_Generated_Image_gdxllugdxllugdxl.png" alt="Logo de Matias" class="logo">
                    </div>
                    <input type="text" id="txtPiloto" class="input-piloto" value="Piloto Matias">

                </div>

                <div class="input-group">
                    <label for="txtTabla" class="label-neon">¿Qué tabla quieres ver?</label>
                    <input type="number" id="txtTabla" class="input-tabla" value="3">
                </div>

                <button class="btn-probar anime-pulse" onclick="generarTablas()">¡INICIAR CONEXIÓN!</button>
            </div>

            <div class="card-franxx panel-2">
                <h3 class="panel-subtitle">Estado del Franxx</h3>
                <div class="radar-box">
                    <p>Sincronización estable.</p>
                    <p>Esperando comandos...</p>
                    <div class="loading-bar"></div>
                </div>
            </div>

            <div class="card-franxx panel-3">
                <h1 class="title-energy" id="txtTitulo">¡TABLA DEL 3!</h1>

                <div class="table-responsive" id="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Nivel Sincronización</th>
                                <th>Poder de Franxx</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="slide-in" style="--delay: 0.1s">
                                <td>3 x 1</td>
                                <td><strong>3</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.2s">
                                <td>3 x 2</td>
                                <td><strong>6</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.3s">
                                <td>3 x 3</td>
                                <td><strong>9</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.4s">
                                <td>3 x 4</td>
                                <td><strong>12</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.5s">
                                <td>3 x 5</td>
                                <td><strong>15</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.6s">
                                <td>3 x 6</td>
                                <td><strong>18</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.7s">
                                <td>3 x 7</td>
                                <td><strong>21</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.8s">
                                <td>3 x 8</td>
                                <td><strong>24</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 0.9s">
                                <td>3 x 9</td>
                                <td><strong>27</strong></td>
                            </tr>
                            <tr class="slide-in" style="--delay: 1.0s">
                                <td>3 x 10</td>
                                <td><strong>30</strong></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
    <script src="Multiplicar.js"></script>
</body>

</html>
